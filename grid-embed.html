<!--
  ============================================================================
  AXAMO GRID BACKGROUND — shared / spanning grid
  One continuous grid + beam animation that sits behind a whole section. Put it
  in footer_wrap so it covers BOTH the globe hero and the footer (no seam).

  Webflow setup:
    1. footer_wrap        -> Position: Relative,  Background: #101216 (dark)
    2. Paste this as the FIRST child of footer_wrap (an Embed element)
    3. The other children (globe-cta hero + Footer) -> Position: Relative, Z-index: 1
       (so they sit above the grid). Use the "bare" hero (embed-bare.html) so the
       grid shows through it.
  No GSAP needed. Do NOT set overflow:hidden on footer_wrap (that breaks the hero pin).
  ============================================================================
-->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/eldardiz/axamo-globe-hero@v5/grid.css" />

<div class="axamo-grid" aria-hidden="true">
  <canvas class="beams"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/gh/eldardiz/axamo-globe-hero@v5/grid.js"></script>
